<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título que aparece no WhatsApp -->
  <title>Limpe seu nome agora</title>

  <!-- Open Graph — WhatsApp lê estas tags -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Limpe seu nome agora" />
  <meta property="og:description" content="Recupere seu crédito e limpe seu nome hoje mesmo. Atendimento rápido e seguro." />
  <meta property="og:url"         content="https://lux-driver-assistent-18y8.vercel.app/limpe-seu-nome.html" />
  <meta property="og:image"       content="https://premium-services-landing.vercel.app/og-image.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"      content="pt_BR" />
  <meta property="og:site_name"   content="Limpe seu nome agora" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Limpe seu nome agora" />
  <meta name="twitter:description" content="Recupere seu crédito e limpe seu nome hoje mesmo." />
  <meta name="twitter:image"       content="https://premium-services-landing.vercel.app/og-image.png" />

  <!-- Redirecionamento automático após 0 segundos -->
  <meta http-equiv="refresh" content="0;url=https://premium-services-landing.vercel.app/" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 900; color: #22c55e; margin-bottom: 12px; }
    p  { color: #aaa; font-size: 15px; margin-bottom: 28px; }
    a  {
      display: inline-block;
      background: #22c55e;
      color: #000;
      font-weight: 800;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="emoji">✅</div>
  <h1>Limpe seu nome agora</h1>
  <p>Redirecionando para a página de serviços...</p>
  <a href="https://premium-services-landing.vercel.app/">Acessar agora →</a>

  <script>
    // Redirecionamento imediato via JS (fallback)
    window.location.replace('https://premium-services-landing.vercel.app/');
  </script>
</body>
</html>
